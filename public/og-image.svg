<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
    <title id="title">Daniel Thorp campaign Open Graph image</title>
    <desc id="desc">Hero-style campaign card with portrait, gradient overlays, and text.</desc>

    <defs>
        <linearGradient id="heroOverlay" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#560216" stop-opacity="0.45" />
            <stop offset="100%" stop-color="#292752" stop-opacity="0.65" />
        </linearGradient>
        <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#05060e" stop-opacity="0.72" />
            <stop offset="48%" stop-color="#05060e" stop-opacity="0.22" />
            <stop offset="100%" stop-color="#05060e" stop-opacity="0" />
        </linearGradient>
    </defs>

    <image href="daniel.webp" x="0" y="0" width="1200" height="630" preserveAspectRatio="xMidYMid slice" />
    <rect x="0" y="0" width="1200" height="630" fill="url(#heroOverlay)" />
    <rect x="0" y="0" width="1200" height="630" fill="url(#vignette)" />

    <text x="600" y="560" text-anchor="middle" fill="#b4c4f6" font-family="Garet, Avenir Next, Montserrat, sans-serif" font-size="82" font-weight="800" letter-spacing="0">
        Vote Daniel Thorp
    </text>
</svg>
